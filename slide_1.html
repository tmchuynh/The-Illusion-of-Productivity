<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>The Illusion of Productivity - Title Slide</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&family=Lora:ital,wght@1,400&display=swap"
        rel="stylesheet" />
    <link href="./main.css" rel="stylesheet" />
    <style>
        .slide-container {
            background-color: #111827;
        }

        .main-title {
            font-size: 96px;
            font-weight: 900;
            line-height: 1.1;
            color: #f9fafb;
            letter-spacing: -2px;
            margin-bottom: 24px;
        }

        .subtitle {
            font-size: 32px;
            font-weight: 400;
            color: #9ca3af;
            line-height: 1.4;
            max-width: 900px;
            margin-bottom: 60px;
        }

        .decorative-shape {
            border-color: rgba(31, 184, 170, 0.08);
            right: -200px;
            top: -200px;
        }

        .decorative-shape-2 {
            background-color: rgba(31, 184, 170, 0.05);
            left: 50px;
            top: 90px;
        }

        .glow-orb {
            position: absolute;
            width: 500px;
            height: 500px;
            background-color: #1fb8aa;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.19;
            top: -200px;
            right: -150px;
            z-index: 1;
            pointer-events: none;
        }

        .accent-bar {
            background-color: #036e65;
        }
    </style>
</head>

<body>
    <div class="slide-container">
        <!-- Background Elements -->
        <div class="decorative-shape"></div>
        <div class="decorative-shape-2"></div>
      

        <div class="content-wrapper">
            <h1 class="main-title">
                <p>The Moment<br />Nobody Celebrates</p>
            </h1>
            <div class="subtitle">
                <p>When you finally stop confusing being busy with being effective—<span class="highlight">and everything about how you work, think, and grow changes forever.</span></p>
            </div>
            <div class="meta-info">
                <p>A Defining Transformation Worth Recognizing</p>
            </div>
        </div>
    </div>
</body>

</html>
